<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clark County — Crash Data Viewer</title>

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <!-- Mapbox GL JS -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>

  <!-- Papa Parse for CSV -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <style>
    /* ─── TOKENS ─── */
    :root {
      --bg:        #f8f9fb;
      --surface:   #ffffff;
      --surface2:  #f1f4f8;
      --border:    #dde2ea;
      --text:      #1a2233;
      --muted:     #6b7a99;
      --accent:    #2563eb;

      /* severity palette */
      --fatal:     #FE343B;
      --serious:   #FEBC40;

      --panel-w:   320px;
      --radius:    6px;
      --mono:      'JetBrains Mono', 'Fira Mono', monospace;
      --sans:      'DM Sans', 'Segoe UI', sans-serif;
    }

    /* ─── RESET ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; -webkit-font-smoothing: antialiased; }

    /* ─── LAYOUT ─── */
    #app { display: flex; height: 100vh; width: 100vw; position: relative; }
    #map  { flex: 1; height: 100%; }

    /* ─── SIDE PANEL ─── */
    #panel {
      width: var(--panel-w);
      height: 100%;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 10;
      overflow: hidden;
    }

    /* header */
    .panel-header {
      padding: 20px 18px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .panel-header .eyebrow {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 4px;
      font-weight: 600;
    }
    .panel-header h1 {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.2;
      color: var(--text);
    }
    .panel-header .sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      font-family: var(--mono);
    }

    /* stats bar */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .stat {
      padding: 10px 12px;
      text-align: center;
      border-right: 1px solid var(--border);
    }
    .stat:last-child { border-right: none; }
    .stat .val {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 700;
      line-height: 1;
      display: block;
    }
    .stat .lbl {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-top: 2px;
      display: block;
    }
    .stat.fatal  .val { color: var(--fatal); }
    .stat.serious .val { color: var(--serious); }
    .stat.total  .val { color: var(--accent); }

    /* controls scroll area */
    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 14px 80px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    /* section */
    .section { margin-bottom: 20px; }
    .section-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      display: block;
    }

    /* severity toggles */
    .sev-grid { display: flex; flex-direction: column; gap: 6px; }
    .sev-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface2);
      cursor: pointer;
      transition: border-color .15s, background .15s;
      user-select: none;
    }
    .sev-btn:hover { border-color: var(--accent); }
    .sev-btn.active { background: #eff6ff; border-color: var(--accent); }
    .sev-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .sev-name { flex: 1; font-size: 13px; }
    .sev-count {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }
    .sev-check {
      width: 16px; height: 16px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .15s, border-color .15s;
    }
    .sev-btn.active .sev-check svg path,
    .mode-btn.active .mode-check svg path { stroke: #fff; }
    .sev-btn.active .sev-check {
      background: var(--accent);
      border-color: var(--accent);
    }
    .sev-check svg { display: none; }
    .sev-btn.active .sev-check svg { display: block; }

    /* year range */
    .year-range {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .year-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .year-input-wrap { position: relative; }
    .year-input-wrap label {
      display: block;
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .year-input-wrap input[type="date"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      padding: 7px 10px;
      cursor: pointer;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }
    .year-input-wrap input[type="date"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
    .year-input-wrap input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; }

    /* legend */
    .legend { display: flex; flex-direction: column; gap: 5px; }
    .legend-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* reset button */
    .reset-btn {
      width: 100%;
      padding: 9px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .06em;
      text-transform: uppercase;
      transition: all .15s;
      margin-top: 4px;
    }
    .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ─── ATTRIBUTION ─── */
    .panel-attribution {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
      flex-shrink: 0;
    }
    .panel-attribution a {
      color: var(--accent);
      text-decoration: none;
    }
    .panel-attribution a:hover { text-decoration: underline; }

    /* ─── MODE FILTER ─── */
    .mode-grid { display: flex; flex-direction: column; gap: 6px; }
    .mode-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface2);
      cursor: pointer;
      transition: border-color .15s, background .15s;
      user-select: none;
      width: 100%;
      text-align: left;
    }
    .mode-btn:hover { border-color: var(--accent); }
    .mode-btn.active { background: #eff6ff; border-color: var(--accent); }
    .mode-icon { line-height: 1; flex-shrink: 0; width: 20px; text-align: center; display: flex; align-items: center; justify-content: center; }
    .mode-icon i { font-size: 14px; color: var(--muted); transition: color .15s; }
    .mode-btn.active .mode-icon i { color: var(--accent); }
    .mode-name { flex: 1; font-size: 13px; }
    .mode-count { font-family: var(--mono); font-size: 11px; color: var(--muted); }
    .mode-check {
      width: 16px; height: 16px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .15s, border-color .15s;
    }
    .mode-btn.active .mode-check { background: var(--accent); border-color: var(--accent); }
    .mode-check svg { display: none; }
    .mode-btn.active .mode-check svg { display: block; }

    /* ─── LOADING OVERLAY ─── */
    #loading {
      position: fixed;
      inset: 0;
      background: #f8f9fb;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: opacity .4s;
    }
    #loading.fade { opacity: 0; pointer-events: none; }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-family: var(--mono); font-size: 12px; color: var(--muted); }

    /* ─── POPUP ─── */
    .mapboxgl-popup-content {
      background: #ffffff !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius) !important;
      padding: 0 !important;
      box-shadow: 0 4px 20px rgba(0,0,0,.12) !important;
      min-width: 220px;
    }
    .mapboxgl-popup-tip { display: none !important; }
    .mapboxgl-popup-close-button {
      color: #6b7a99 !important;
      font-size: 16px !important;
      padding: 6px 10px !important;
    }
    .popup-inner { padding: 14px 16px; }
    .popup-sev {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .1em;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .popup-dot { width: 8px; height: 8px; border-radius: 50%; }
    .popup-row { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 5px; font-size: 12px; }
    .popup-row .pk { color: var(--muted); }
    .popup-row .pv { color: var(--text); font-family: var(--mono); text-align: right; }
    .popup-divider { height: 1px; background: var(--border); margin: 8px 0; }
    .popup-factors-heading { font-size: 11px; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin: 8px 0 4px; display: block; }
    .popup-factors-list { margin: 0 0 4px 0; padding: 0; list-style: none; }
    .popup-factors-list li { font-size: 12px; color: var(--text); padding: 2px 0 2px 12px; position: relative; }
    .popup-factors-list li::before { content: '•'; position: absolute; left: 0; color: var(--muted); }
    .popup-flag-val { font-size: 13px; font-family: var(--sans) !important; }
    .flag-yes { color: #94a3b8 !important; }
    .flag-no  { color: #cbd5e1 !important; }

    /* ─── HOVER TOOLTIP ─── */


    /* ─── CONFIG BANNER ─── */
    #config-banner {
      position: absolute;
      top: 16px; left: 50%; transform: translateX(-50%);
      background: #2563eb;
      color: #fff;
      padding: 8px 16px;
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 11px;
      z-index: 200;
      display: none;
      max-width: 500px;
      text-align: center;
      line-height: 1.5;
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
    }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #c8d0de; border-radius: 4px; }

    /* ─── TIME CHART ─── */
    .chart-wrap { display: flex; flex-direction: column; gap: 5px; }
    .chart-row { display: flex; align-items: center; gap: 8px; cursor: pointer; border-radius: 4px; padding: 2px 4px; transition: background .12s; }
    .chart-row:hover { background: var(--surface2); }
    .chart-row.active { background: #eff6ff; }
    .chart-label { font-family: var(--mono); font-size: 10px; color: var(--muted); width: 72px; flex-shrink: 0; text-align: right; }
    .chart-row.active .chart-label { color: var(--accent); font-weight: 600; }
    .chart-bar-wrap { flex: 1; background: var(--surface2); border-radius: 3px; height: 18px; overflow: hidden; }
    .chart-bar { height: 100%; background: #1a2233; border-radius: 3px; transition: width .35s ease; min-width: 0; }
    .chart-row.active .chart-bar { background: var(--accent); }
    .chart-count { font-family: var(--mono); font-size: 10px; color: var(--muted); width: 28px; text-align: right; flex-shrink: 0; }

    /* ─── DAY OF WEEK ─── */
    .dow-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .dow-day {
      aspect-ratio: 1;
      border-radius: 5px;
      border: 1.5px solid transparent;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer;
      transition: border-color .15s, transform .1s;
      position: relative;
      overflow: hidden;
      gap: 2px;
    }
    .dow-day:hover { border-color: var(--accent); transform: scale(1.06); }
    .dow-day.active { border-color: var(--accent) !important; border-width: 3px !important; }
    .dow-day .dow-label {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      position: relative;
      z-index: 1;
      line-height: 1;
    }
    .dow-day .dow-count {
      font-family: var(--mono);
      font-size: 9px;
      position: relative;
      z-index: 1;
      line-height: 1;
    }
    .dow-day .dow-bg {
      position: absolute;
      inset: 0;
      border-radius: 4px;
      transition: opacity .3s;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 640px) {
      :root { --panel-w: 100vw; }
      #app { flex-direction: column; }
      #panel { width: 100%; height: auto; max-height: 45vh; border-right: none; border-bottom: 1px solid var(--border); }
      #map { flex: 1; min-height: 0; }
    }
  </style>
</head>

<body>

<!-- ─── LOADING ─── -->
<div id="loading">
  <div class="spinner"></div>
  <p id="loading-msg">Initializing map…</p>
</div>

<!-- ─── CONFIG BANNER ─── -->
<div id="config-banner" id="config-banner"></div>

<!-- ─── HOVER TOOLTIP ─── -->
<div id="app">

  <!-- SIDE PANEL -->
  <aside id="panel">
    <div class="panel-header">
      <div class="eyebrow">Clark County, NV</div>
      <h1>Crash Data Viewer</h1>
      <div class="sub" id="date-range-label">Loading…</div>
    </div>

    <div class="stats-bar">
      <div class="stat fatal">
        <span class="val" id="stat-fatal">—</span>
        <span class="lbl">Fatalities</span>
      </div>
      <div class="stat serious">
        <span class="val" id="stat-serious">—</span>
        <span class="lbl">Serious Injury</span>
      </div>
    </div>

    <div class="panel-body">

      <!-- SEVERITY FILTER -->
      <div class="section">
        <span class="section-label">Severity</span>
        <div class="sev-grid" id="sev-filters"></div>
      </div>

      <!-- MODE FILTER -->
      <div class="section">
        <span class="section-label">Involvement</span>
        <div class="mode-grid" id="mode-filters"></div>
      </div>

      <!-- DATE FILTER -->
      <div class="section">
        <span class="section-label">Date Range</span>
        <div class="year-range">
          <div class="year-inputs">
            <div class="year-input-wrap">
              <label>From</label>
              <input type="date" id="date-from" />
            </div>
            <div class="year-input-wrap">
              <label>To</label>
              <input type="date" id="date-to" />
            </div>
          </div>
        </div>
      </div>

      <!-- TIME OF DAY CHART -->
      <div class="section">
        <span class="section-label">Time of Day</span>
        <div class="chart-wrap" id="time-chart"></div>
      </div>

      <!-- DAY OF WEEK -->
      <div class="section">
        <span class="section-label">Day of Week</span>
        <div class="dow-grid" id="dow-chart"></div>
      </div>

      <!-- LEGEND -->
      <div class="section">
        <span class="section-label">Legend</span>
        <div class="legend" id="legend"></div>
      </div>

      <button class="reset-btn" id="reset-btn">↺ Reset All Filters</button>

    </div>

    <div class="panel-attribution">
      Data from <a href="https://www.dot.nv.gov/safety/traffic-crash-data" target="_blank" rel="noopener">NDOT</a>
      &mdash; Visualization created by <a href="https://charliehenry.ch/" target="_blank" rel="noopener">Charlie Henry</a>
    </div>
  </aside>

  <!-- MAP -->
  <div id="map"></div>

</div>

<script src="config.js"></script>

<script>
/* ═══════════════════════════════════════════════════════════════
   CONFIGURATION — edit these values for your deployment
═══════════════════════════════════════════════════════════════ */
const CONFIG = {
  // 1) Your Mapbox public token
  mapboxToken: (window.ENV && window.ENV.MAPBOX_TOKEN) || 'YOUR_MAPBOX_TOKEN_HERE',

  // 2) Public URL to your GCS CSV
  csvUrl: 'https://storage.googleapis.com/aus-dashboard/clark_vz/clark_vz_data.csv',

  // 3) Column name mappings
  columns: {
    lat:          'lat',
    lng:          'lng',
    severity:     'severity',
    date:         'date',
    numFatalities:'NumFatalities',
    numInjured:   'NumInjured',
    crashType:    'VehCrashType',
    vehicleFactors: 'vehicle_factors',
    crashNum:     'CrashNum',
    hitAndRun:    'HitandRun',
    alcohol:      'AlcoholInvolved',
    pedestrian:   'PedestrianInvolved',
    motorcycle:   'MotorcycleInvolved',
    extras: []
  },

  // 4) Map severity values → display categories
  severityMap: {
    'fatal':          'fatal',
    'Fatal':          'fatal',
    'serious injury': 'serious',
    'Serious Injury': 'serious',
  },

  // 5) Initial map center (Las Vegas / Clark County)
  initialCenter: [-115.1398, 36.1699],
  initialZoom:   10,
};

/* ═══════════════════════════════════════════════════════════════
   SEVERITY DISPLAY CONFIG
═══════════════════════════════════════════════════════════════ */
const SEVERITIES = [
  { id: 'fatal',   label: 'Fatal',          color: '#FE343B', radius: 6 },
  { id: 'serious', label: 'Serious Injury', color: '#FEBC40', radius: 6 },
];

const SEV_COLOR_MAP = Object.fromEntries(SEVERITIES.map(s => [s.id, s.color]));

/* ═══════════════════════════════════════════════════════════════
   INVOLVEMENT FLAGS CONFIG
═══════════════════════════════════════════════════════════════ */
const FLAGS = [
  { id: 'alcohol',    label: 'Alcohol Involved',    faClass: 'fa-solid fa-wine-glass',  col: 'alcohol'    },
  { id: 'pedestrian', label: 'Pedestrian Involved', faClass: 'fa-solid fa-walking',      col: 'pedestrian' },
  { id: 'motorcycle', label: 'Motorcycle Involved', faClass: 'fa-solid fa-motorcycle',   col: 'motorcycle' },
  { id: 'hitandrun',  label: 'Hit & Run',           faClass: 'fa-solid fa-car-burst',    col: 'hitandrun'  },
];

/* ═══════════════════════════════════════════════════════════════
   TIME SLOTS CONFIG
═══════════════════════════════════════════════════════════════ */
const TIME_SLOTS = [
  { label: '12AM–4AM', startHour: 0,  endHour: 4  },
  { label: '4AM–8AM',  startHour: 4,  endHour: 8  },
  { label: '8AM–12PM', startHour: 8,  endHour: 12 },
  { label: '12PM–4PM', startHour: 12, endHour: 16 },
  { label: '4PM–8PM',  startHour: 16, endHour: 20 },
  { label: '8PM–12AM', startHour: 20, endHour: 24 },
];

const DOW_DAYS = [
  { label: 'Su', fullLabel: 'Sunday',    dow: 0 },
  { label: 'Mo', fullLabel: 'Monday',    dow: 1 },
  { label: 'Tu', fullLabel: 'Tuesday',   dow: 2 },
  { label: 'We', fullLabel: 'Wednesday', dow: 3 },
  { label: 'Th', fullLabel: 'Thursday',  dow: 4 },
  { label: 'Fr', fullLabel: 'Friday',    dow: 5 },
  { label: 'Sa', fullLabel: 'Saturday',  dow: 6 },
];

/* ═══════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════════ */
let allFeatures = [];
let activeFilters = {
  severities: new Set(SEVERITIES.map(s => s.id)),
  flags:      null,
  dateFrom:   null,
  dateTo:     null,
  timeSlot:   null, // null = all times; 0-5 = index into TIME_SLOTS
  dowDays:    null, // null = all days; Set of dow integers (0=Sun … 6=Sat)
};
let map, popup;

/* ═══════════════════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════════════════ */
function setLoading(msg) {
  document.getElementById('loading-msg').textContent = msg;
}
function hideLoading() {
  const el = document.getElementById('loading');
  el.classList.add('fade');
  setTimeout(() => el.remove(), 500);
}

function showBanner(msg) {
  const el = document.getElementById('config-banner');
  el.textContent = msg;
  el.style.display = 'block';
}

function parseSeverity(raw) {
  if (raw == null) return 'unknown';
  const key = String(raw).trim().toLowerCase();
  return CONFIG.severityMap[key] || CONFIG.severityMap[raw] || 'unknown';
}

function parseYear(raw) {
  if (!raw) return null;
  const d = new Date(raw);
  if (!isNaN(d)) return d.getFullYear();
  const m = String(raw).match(/\d{4}/);
  return m ? parseInt(m[0]) : null;
}

function formatNum(n) {
  return n.toLocaleString();
}

/* ═══════════════════════════════════════════════════════════════
   VALIDATE CONFIG
═══════════════════════════════════════════════════════════════ */
function validateConfig() {
  const issues = [];
  if (CONFIG.mapboxToken === 'YOUR_MAPBOX_TOKEN_HERE')
    issues.push('Set CONFIG.mapboxToken to your Mapbox public token.');
  if (CONFIG.csvUrl === 'YOUR_GCS_CSV_URL_HERE')
    issues.push('Set CONFIG.csvUrl to your GCS bucket CSV URL.');
  if (issues.length) {
    showBanner('⚠ Configuration needed: ' + issues.join(' '));
    return false;
  }
  return true;
}

/* ═══════════════════════════════════════════════════════════════
   CSV LOAD + PARSE
═══════════════════════════════════════════════════════════════ */
function loadCsv(url) {
  return new Promise((resolve, reject) => {
    Papa.parse(url, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: r => resolve(r.data),
      error: e => reject(e),
    });
  });
}

function csvToFeatures(rows) {
  const { lat, lng, severity, date, extras } = CONFIG.columns;
  const features = [];

  for (const row of rows) {
    const la = parseFloat(row[lat]);
    const lo = parseFloat(row[lng]);
    if (isNaN(la) || isNaN(lo)) continue;

    const sev  = parseSeverity(row[severity]);
    const year = parseYear(row[date]);

    // Store ISO date string (YYYY-MM-DD) and hour for filtering
    let isoDate = null;
    let hour = null;
    let dow  = null;
    if (row[date]) {
      const d = new Date(row[date]);
      if (!isNaN(d)) {
        isoDate = d.toISOString().slice(0, 10);
        hour = d.getHours();
        dow  = d.getDay();
      }
    }

    // Extract boolean involvement flags
    const cols = CONFIG.columns;
    const parseFlag = v => v === true || String(v).trim().toLowerCase() === 'true';
    const flags = {
      alcohol:    parseFlag(row[cols.alcohol]),
      pedestrian: parseFlag(row[cols.pedestrian]),
      motorcycle: parseFlag(row[cols.motorcycle]),
      hitandrun:  parseFlag(row[cols.hitAndRun]),
    };

    // Extract numeric crash fields
    const numFatalities = parseInt(row[cols.numFatalities]) || 0;
    const numInjured    = parseInt(row[cols.numInjured])    || 0;

    const props = { sev, year, isoDate, hour, dow, numFatalities, numInjured,
                    flags: JSON.stringify(flags), _raw: row };
    features.push({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [lo, la] },
      properties: props,
    });
  }
  return features;
}

/* ═══════════════════════════════════════════════════════════════
   FILTER + STATS
═══════════════════════════════════════════════════════════════ */
function filteredFeatures() {
  return allFeatures.filter(f => {
    const { sev, isoDate } = f.properties;
    if (!activeFilters.severities.has(sev)) return false;
    if (activeFilters.dateFrom && isoDate && isoDate < activeFilters.dateFrom) return false;
    if (activeFilters.dateTo   && isoDate && isoDate > activeFilters.dateTo)   return false;
    // Flag filter: crash must have true for at least one selected flag
    if (activeFilters.flags !== null) {
      let flags;
      try { flags = JSON.parse(f.properties.flags || '{}'); } catch(e) { flags = {}; }
      const matchesAny = [...activeFilters.flags].some(id => flags[id] === true);
      if (!matchesAny) return false;
    }
    // Time slot filter
    if (activeFilters.timeSlot !== null) {
      const slot = TIME_SLOTS[activeFilters.timeSlot];
      const h = f.properties.hour;
      if (h === null || h === undefined || h < slot.startHour || h >= slot.endHour) return false;
    }
    // Day of week filter
    if (activeFilters.dowDays !== null) {
      const d = f.properties.dow;
      if (d === null || d === undefined || !activeFilters.dowDays.has(d)) return false;
    }
    return true;
  });
}

function countBySev(features) {
  const counts = {};
  for (const f of features) {
    const s = f.properties.sev;
    counts[s] = (counts[s] || 0) + 1;
  }
  return counts;
}

function updateStats() {
  const visible = filteredFeatures();
  // Fatal stat = sum of NumFatalities across visible crashes
  const totalFatalities = visible.reduce((sum, f) => sum + (f.properties.numFatalities || 0), 0);
  document.getElementById('stat-fatal').textContent   = formatNum(totalFatalities);
  // Serious stat = count of crashes with severity=serious
  const counts = countBySev(visible);
  document.getElementById('stat-serious').textContent = formatNum(counts.serious || 0);

  // update sev button counts (total across all data)
  for (const sev of SEVERITIES) {
    const el = document.querySelector(`[data-sev="${sev.id}"] .sev-count`);
    if (el) el.textContent = formatNum(countBySev(allFeatures)[sev.id] || 0);
  }
  // update flag button counts against severity+date filtered set (before flag filter)
  const preFlagFiltered = allFeatures.filter(f => {
    const { sev, isoDate } = f.properties;
    if (!activeFilters.severities.has(sev)) return false;
    if (activeFilters.dateFrom && isoDate && isoDate < activeFilters.dateFrom) return false;
    if (activeFilters.dateTo   && isoDate && isoDate > activeFilters.dateTo)   return false;
    return true;
  });
  for (const flag of FLAGS) {
    const el = document.querySelector(`[data-flag="${flag.id}"] .mode-count`);
    if (!el) continue;
    const count = preFlagFiltered.filter(f => {
      try { return JSON.parse(f.properties.flags || '{}')[flag.id] === true; } catch(e) { return false; }
    }).length;
    el.textContent = formatNum(count);
  }
  updateChart();
  updateDowChart();
}

/* ═══════════════════════════════════════════════════════════════
   MAP SOURCE UPDATE
═══════════════════════════════════════════════════════════════ */
function refreshMap() {
  if (!map || !map.getSource('crashes')) return;
  const visible = filteredFeatures();
  map.getSource('crashes').setData({
    type: 'FeatureCollection',
    features: visible,
  });
  updateStats();
}

/* ═══════════════════════════════════════════════════════════════
   POPUP
═══════════════════════════════════════════════════════════════ */
function buildPopupHTML(props) {
  const sev   = props.sev || 'unknown';
  const color = SEV_COLOR_MAP[sev] || '#94a3b8';
  const raw   = props._raw || {};

  let rows = '';

  // Format datetime nicely
  const dateVal = raw[CONFIG.columns.date];
  if (dateVal) {
    const d = new Date(dateVal);
    if (!isNaN(d)) {
      const datePart = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      const timePart = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
      rows += popupRow('Date', datePart);
      rows += popupRow('Time', timePart);
    } else {
      rows += popupRow('Date', dateVal);
    }
  }

  // Crash number
  const crashNum = raw[CONFIG.columns.crashNum];
  if (crashNum) rows += popupRow('Crash #', crashNum);

  // Crash type
  const crashType = raw[CONFIG.columns.crashType];
  if (crashType && crashType !== '') rows += popupRow('Crash Type', crashType);

  // Fatalities + injuries
  const numFat = parseInt(raw[CONFIG.columns.numFatalities]) || 0;
  const numInj = parseInt(raw[CONFIG.columns.numInjured])    || 0;
  if (numFat > 0) rows += popupRow('Fatalities', numFat);
  if (numInj > 0) rows += popupRow('Injured',    numInj);

  // Involvement flags — always show all with ✓ or ✗
  let flags;
  try { flags = JSON.parse(props.flags || '{}'); } catch(e) { flags = {}; }
  rows += `<div class="popup-divider"></div>`;
  const allFlagRows = FLAGS.map(f => ({ label: f.label, val: flags[f.id] === true }));
  for (const f of allFlagRows) {
    rows += `<div class="popup-row">
      <span class="pk">${f.label}</span>
      <span class="pv popup-flag-val ${f.val ? 'flag-yes' : 'flag-no'}">${f.val ? '✓' : '✗'}</span>
    </div>`;
  }

  // show extras
  for (const ex of CONFIG.columns.extras) {
    const v = raw[ex.col];
    if (v != null && v !== '') rows += popupRow(ex.label, v);
  }

  // vehicle factors — semi-colon separated, shown as bulleted list
  const factorsRaw = raw[CONFIG.columns.vehicleFactors];
  if (factorsRaw && String(factorsRaw).trim() !== '') {
    const factors = String(factorsRaw).split(';').map(s => s.trim()).filter(Boolean);
    if (factors.length > 0) {
      rows += `<div class="popup-divider"></div>
        <span class="popup-factors-heading">Other Factors</span>
        <ul class="popup-factors-list">${factors.map(f => `<li>${f}</li>`).join('')}</ul>`;
    }
  }

  const sevLabel = SEVERITIES.find(s => s.id === sev)?.label || sev;

  return `
    <div class="popup-inner">
      <div class="popup-sev" style="color:${color}">
        <span class="popup-dot" style="background:${color}"></span>
        ${sevLabel}
      </div>
      ${rows}
    </div>`;
}

function popupRow(k, v) {
  return `<div class="popup-row"><span class="pk">${k}</span><span class="pv">${v}</span></div>`;
}

/* ═══════════════════════════════════════════════════════════════
   BUILD SEVERITY FILTER UI
═══════════════════════════════════════════════════════════════ */
function buildSevFilters() {
  const container = document.getElementById('sev-filters');
  const allCounts = countBySev(allFeatures);

  for (const sev of SEVERITIES) {
    const count = allCounts[sev.id] || 0;
    const btn = document.createElement('button');
    btn.className = 'sev-btn active';
    btn.dataset.sev = sev.id;
    btn.innerHTML = `
      <span class="sev-dot" style="background:${sev.color}"></span>
      <span class="sev-name">${sev.label}</span>
      <span class="sev-count">${formatNum(count)}</span>
      <span class="sev-check">
        <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
          <path d="M1 4l3 3 5-6" stroke="var(--bg)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>`;
    btn.addEventListener('click', () => {
      const s = btn.dataset.sev;
      if (activeFilters.severities.has(s)) {
        activeFilters.severities.delete(s);
        btn.classList.remove('active');
      } else {
        activeFilters.severities.add(s);
        btn.classList.add('active');
      }
      refreshMap();
    });
    container.appendChild(btn);
  }
}

/* ═══════════════════════════════════════════════════════════════
   BUILD MODE FILTER UI
═══════════════════════════════════════════════════════════════ */
function buildFlagFilters() {
  const container = document.getElementById('mode-filters');

  for (const flag of FLAGS) {
    const btn = document.createElement('button');
    btn.className = 'mode-btn';
    btn.dataset.flag = flag.id;
    btn.innerHTML = `
      <span class="mode-icon"><i class="${flag.faClass}"></i></span>
      <span class="mode-name">${flag.label}</span>
      <span class="mode-count">—</span>
      <span class="mode-check">
        <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
          <path d="M1 4l3 3 5-6" stroke="var(--bg)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>`;
    btn.addEventListener('click', () => {
      const flagId = flag.id;
      if (activeFilters.flags === null) {
        activeFilters.flags = new Set([flagId]);
      } else if (activeFilters.flags.has(flagId)) {
        activeFilters.flags.delete(flagId);
        if (activeFilters.flags.size === 0) activeFilters.flags = null;
      } else {
        activeFilters.flags.add(flagId);
      }
      container.querySelectorAll('[data-flag]').forEach(b => {
        b.classList.toggle('active', activeFilters.flags !== null && activeFilters.flags.has(b.dataset.flag));
      });
      refreshMap();
    });
    container.appendChild(btn);
  }
}

/* ═══════════════════════════════════════════════════════════════
   BUILD DATE SELECTORS
═══════════════════════════════════════════════════════════════ */
function toDateStr(d) {
  // returns YYYY-MM-DD string from a Date object
  return d.toISOString().slice(0, 10);
}

function buildYearSelectors() {
  const dates = allFeatures
    .map(f => f.properties.isoDate)
    .filter(Boolean)
    .sort();

  if (dates.length === 0) return;

  const minDate = dates[0];
  const maxDate = dates[dates.length - 1];

  activeFilters.dateFrom = minDate;
  activeFilters.dateTo   = maxDate;

  const fromInput = document.getElementById('date-from');
  const toInput   = document.getElementById('date-to');

  fromInput.min = minDate;
  fromInput.max = maxDate;
  fromInput.value = minDate;

  toInput.min = minDate;
  toInput.max = maxDate;
  toInput.value = maxDate;

  const fmt = s => {
    const d = new Date(s + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
  };
  document.getElementById('date-range-label').textContent = `${fmt(minDate)} – ${fmt(maxDate)}`;

  fromInput.addEventListener('change', () => {
    activeFilters.dateFrom = fromInput.value;
    if (fromInput.value > toInput.value) {
      toInput.value = fromInput.value;
      activeFilters.dateTo = fromInput.value;
    }
    refreshMap();
  });
  toInput.addEventListener('change', () => {
    activeFilters.dateTo = toInput.value;
    if (toInput.value < fromInput.value) {
      fromInput.value = toInput.value;
      activeFilters.dateFrom = toInput.value;
    }
    refreshMap();
  });
}

/* ═══════════════════════════════════════════════════════════════
   BUILD LEGEND
═══════════════════════════════════════════════════════════════ */
function buildLegend() {
  const container = document.getElementById('legend');
  for (const sev of SEVERITIES) {
    const row = document.createElement('div');
    row.className = 'legend-row';
    row.innerHTML = `<span class="legend-dot" style="background:${sev.color}"></span>${sev.label}`;
    container.appendChild(row);
  }
}

/* ═══════════════════════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════════════════════ */
function resetFilters() {
  activeFilters.severities = new Set(SEVERITIES.map(s => s.id));
  document.querySelectorAll('.sev-btn').forEach(b => b.classList.add('active'));

  // reset flag filter
  activeFilters.flags = null;
  document.querySelectorAll('#mode-filters [data-flag]').forEach(b => b.classList.remove('active'));

  // reset time slot
  activeFilters.timeSlot = null;

  // reset day of week
  activeFilters.dowDays = null;
  document.querySelectorAll('#dow-chart .dow-day').forEach(b => b.classList.remove('active'));

  const fromInput = document.getElementById('date-from');
  const toInput   = document.getElementById('date-to');
  if (fromInput && toInput) {
    activeFilters.dateFrom = fromInput.min;
    activeFilters.dateTo   = toInput.max;
    fromInput.value = fromInput.min;
    toInput.value   = toInput.max;
  }
  refreshMap();
  map.flyTo({ center: CONFIG.initialCenter, zoom: CONFIG.initialZoom });
}

/* ═══════════════════════════════════════════════════════════════
   ADD MAP LAYERS
═══════════════════════════════════════════════════════════════ */
function addMapLayers() {
  // remove existing if style reload
  if (map.getSource('crashes')) {
    ['crashes-circles', 'crashes-halos'].forEach(id => {
      if (map.getLayer(id)) map.removeLayer(id);
    });
    map.removeSource('crashes');
  }

  const visible = filteredFeatures();

  map.addSource('crashes', {
    type: 'geojson',
    data: { type: 'FeatureCollection', features: visible },
    generateId: true,
  });

  // Halo layer (glow effect for fatal/serious)
  map.addLayer({
    id: 'crashes-halos',
    type: 'circle',
    source: 'crashes',
    filter: ['in', ['get', 'sev'], ['literal', ['fatal', 'serious']]],
    paint: {
      'circle-radius': [
        'match', ['get', 'sev'],
        'fatal',   14,
        'serious', 10,
        8
      ],
      'circle-color': [
        'match', ['get', 'sev'],
        'fatal',   '#FE343B',
        'serious', '#FEBC40',
        '#ffffff'
      ],
      'circle-opacity': 0.15,
      'circle-blur': 1,
    }
  });

  // Main dots
  map.addLayer({
    id: 'crashes-circles',
    type: 'circle',
    source: 'crashes',
    paint: {
      'circle-radius': [
        'interpolate', ['linear'], ['zoom'],
        8,  6,
        14, 10,
      ],
      'circle-color': [
        'match', ['get', 'sev'],
        'fatal',   '#FE343B',
        'serious', '#FEBC40',
        '#94a3b8'
      ],
      'circle-opacity': [
        'interpolate', ['linear'], ['zoom'],
        8, 0.75,
        14, 0.9
      ],
      'circle-stroke-color': '#ffffff',
      'circle-stroke-width': 0.5,
      'circle-sort-key': [
        'match', ['get', 'sev'],
        'fatal', 2, 'serious', 1, 0
      ],
    }
  });

  // ─ hover cursor
  map.on('mouseenter', 'crashes-circles', () => {
    map.getCanvas().style.cursor = 'pointer';
  });

  map.on('mouseleave', 'crashes-circles', () => {
    map.getCanvas().style.cursor = '';
  });

  // ─ click crash → open popup
  map.on('click', 'crashes-circles', e => {
    e.preventDefault();
    const f = e.features[0];
    let props = { ...f.properties };
    try { props._raw = JSON.parse(props._raw); } catch(e) { props._raw = {}; }

    popup
      .setLngLat(e.lngLat)
      .setHTML(buildPopupHTML(props))
      .addTo(map);

  });

  // ─ click map background → close popup
  map.on('click', e => {
    if (!e.defaultPrevented) popup.remove();
  });
}

/* ═══════════════════════════════════════════════════════════════
   TIME OF DAY CHART
═══════════════════════════════════════════════════════════════ */
function updateChart() {
  const container = document.getElementById('time-chart');
  if (!container) return;

  // Count crashes per slot from features that pass all filters EXCEPT timeSlot
  const preTimeFiltered = allFeatures.filter(f => {
    const { sev, isoDate } = f.properties;
    if (!activeFilters.severities.has(sev)) return false;
    if (activeFilters.dateFrom && isoDate && isoDate < activeFilters.dateFrom) return false;
    if (activeFilters.dateTo   && isoDate && isoDate > activeFilters.dateTo)   return false;
    if (activeFilters.flags !== null) {
      let flags;
      try { flags = JSON.parse(f.properties.flags || '{}'); } catch(e) { flags = {}; }
      if (![...activeFilters.flags].some(id => flags[id] === true)) return false;
    }
    return true;
  });

  const counts = TIME_SLOTS.map(slot =>
    preTimeFiltered.filter(f => {
      const h = f.properties.hour;
      return h !== null && h !== undefined && h >= slot.startHour && h < slot.endHour;
    }).length
  );

  const maxCount = Math.max(...counts, 1);

  container.querySelectorAll('.chart-row').forEach((row, i) => {
    const count = counts[i];
    const pct = (count / maxCount) * 100;
    row.querySelector('.chart-bar').style.width = pct + '%';
    row.querySelector('.chart-count').textContent = count;
    row.classList.toggle('active', activeFilters.timeSlot === i);
  });
}

function buildChart() {
  const container = document.getElementById('time-chart');

  TIME_SLOTS.forEach((slot, i) => {
    const row = document.createElement('div');
    row.className = 'chart-row';
    row.dataset.slot = i;
    row.innerHTML = `
      <span class="chart-label">${slot.label}</span>
      <div class="chart-bar-wrap"><div class="chart-bar" style="width:0%"></div></div>
      <span class="chart-count">—</span>`;

    row.addEventListener('click', () => {
      if (activeFilters.timeSlot === i) {
        // clicking active slot deselects it
        activeFilters.timeSlot = null;
      } else {
        activeFilters.timeSlot = i;
      }
      refreshMap();
    });

    container.appendChild(row);
  });
}

/* ═══════════════════════════════════════════════════════════════
   DAY OF WEEK CHART
═══════════════════════════════════════════════════════════════ */
function getPreDowFiltered() {
  return allFeatures.filter(f => {
    const { sev, isoDate } = f.properties;
    if (!activeFilters.severities.has(sev)) return false;
    if (activeFilters.dateFrom && isoDate && isoDate < activeFilters.dateFrom) return false;
    if (activeFilters.dateTo   && isoDate && isoDate > activeFilters.dateTo)   return false;
    if (activeFilters.flags !== null) {
      let flags;
      try { flags = JSON.parse(f.properties.flags || '{}'); } catch(e) { flags = {}; }
      if (![...activeFilters.flags].some(id => flags[id] === true)) return false;
    }
    if (activeFilters.timeSlot !== null) {
      const slot = TIME_SLOTS[activeFilters.timeSlot];
      const h = f.properties.hour;
      if (h === null || h === undefined || h < slot.startHour || h >= slot.endHour) return false;
    }
    return true;
  });
}

function updateDowChart() {
  const container = document.getElementById('dow-chart');
  if (!container) return;

  const base = getPreDowFiltered();
  const counts = DOW_DAYS.map(d => base.filter(f => f.properties.dow === d.dow).length);
  const maxCount = Math.max(...counts, 1);

  container.querySelectorAll('.dow-day').forEach((el, i) => {
    const count = counts[i];
    const intensity = count / maxCount;
    // shade from light grey → dark navy using intensity
    const bg = el.querySelector('.dow-bg');
    bg.style.background = '#1a2233';
    bg.style.opacity = (0.06 + intensity * 0.88).toFixed(2);
    el.querySelector('.dow-count').textContent = count;

    const isActive = activeFilters.dowDays !== null && activeFilters.dowDays.has(i);
    el.classList.toggle('active', isActive);
    // text color: dark on light bg, light on dark bg
    const textColor = intensity > 0.5 ? '#ffffff' : 'var(--text)';
    el.querySelector('.dow-label').style.color = textColor;
    el.querySelector('.dow-count').style.color = intensity > 0.5 ? 'rgba(255,255,255,0.7)' : 'var(--muted)';
  });
}

function buildDowChart() {
  const container = document.getElementById('dow-chart');

  DOW_DAYS.forEach((day, i) => {
    const el = document.createElement('div');
    el.className = 'dow-day';
    el.title = day.fullLabel;
    el.innerHTML = `
      <div class="dow-bg"></div>
      <span class="dow-label">${day.label}</span>
      <span class="dow-count">—</span>`;

    el.addEventListener('click', () => {
      if (activeFilters.dowDays === null) {
        activeFilters.dowDays = new Set([i]);
      } else if (activeFilters.dowDays.has(i)) {
        activeFilters.dowDays.delete(i);
        if (activeFilters.dowDays.size === 0) activeFilters.dowDays = null;
      } else {
        activeFilters.dowDays.add(i);
      }
      refreshMap();
    });

    container.appendChild(el);
  });
}

/* ═══════════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════════ */
async function init() {
  const configured = validateConfig();

  // ─ init Mapbox
  mapboxgl.accessToken = configured ? CONFIG.mapboxToken : 'pk.eyJ1IjoiZXhhbXBsZSIsImEiOiJleGFtcGxlIn0.example';

  map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/light-v8',
    center: CONFIG.initialCenter,
    zoom:   CONFIG.initialZoom,
    attributionControl: false,
    maxBounds: [
      [-116.790925, 34.277257],  // SW corner
      [-113.148819, 37.578262],  // NE corner
    ],
    minZoom: 8,
  });

  map.addControl(new mapboxgl.NavigationControl(), 'bottom-right');
  map.addControl(new mapboxgl.ScaleControl({ unit: 'imperial' }), 'bottom-left');
  map.addControl(new mapboxgl.AttributionControl({ compact: true }), 'bottom-right');

  popup = new mapboxgl.Popup({ closeButton: true, closeOnClick: false, maxWidth: '300px' });

  // ESC key closes popup
  document.addEventListener('keydown', e => { if (e.key === 'Escape') popup.remove(); });

  buildLegend();
  document.getElementById('reset-btn').addEventListener('click', resetFilters);

  setLoading('Loading crash data…');

  // ─ load data
  if (configured) {
    try {
      const rows = await loadCsv(CONFIG.csvUrl);
      allFeatures = csvToFeatures(rows).map(f => ({
        ...f,
        properties: { ...f.properties, _raw: JSON.stringify(f.properties._raw) }
      }));
    } catch(err) {
      showBanner(`Failed to load CSV: ${err.message}. Check CORS settings on your GCS bucket.`);
      allFeatures = generateDemoFeatures();
    }
  } else {
    // demo mode
    allFeatures = generateDemoFeatures();
    document.getElementById('date-range-label').textContent = 'Demo mode — configure CONFIG above';
  }

  buildSevFilters();
  buildFlagFilters();
  buildChart();
  buildDowChart();
  buildYearSelectors();
  updateStats();

  // ─ add layers once map is ready
  map.on('load', () => {
    addMapLayers();
    hideLoading();
  });
  // if map already loaded (race condition)
  if (map.loaded()) { addMapLayers(); hideLoading(); }
}

init();
</script>
